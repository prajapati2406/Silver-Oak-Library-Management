<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Silver Oak LMS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">
                <div class="logo-icon">📚</div>
                Silver Oak LMS
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="student-login.html">Student Login</a></li>
                    <li><a href="admin-login.html">Admin Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="form-container">
            <h1 style="text-align: center; color: #333; margin-bottom: 30px;">📚 Student Login</h1>
            
            <form onsubmit="validateStudentLogin(event)">
                <!-- Name -->
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <!-- Enrollment Number -->
                <div class="form-group">
                    <label for="enrollment">Enrollment Number *</label>
                    <input type="text" id="enrollment" placeholder="e.g., E001234" required>
                </div>

                <!-- Date of Birth -->
                <div class="form-group">
                    <label for="dob">Date of Birth *</label>
                    <input type="date" id="dob" required>
                </div>

                <!-- Mobile Number -->
                <div class="form-group">
                    <label for="mobile">Mobile Number *</label>
                    <input type="tel" id="mobile" placeholder="10-digit mobile number" pattern="[0-9]{10}" required>
                    <small style="color: #666;">Enter a 10-digit mobile number without spaces</small>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" placeholder="your.email@example.com" required>
                </div>

                <!-- Captcha Section -->
                <div class="captcha-section">
                    <label>Security Verification *</label>
                    <div class="captcha-image" id="captcha-image">Loading...</div>
                    <div class="form-group" style="margin-bottom: 10px;">
                        <input type="text" id="captcha-input" placeholder="Enter the code above" style="width: 100%;" required maxlength="6">
                    </div>
                    <button type="button" class="btn-refresh-captcha" onclick="refreshCaptcha()">🔄 Refresh Code</button>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit">Login</button>

                <div class="form-link">
                    <p>Don't have an account? Contact administration or <a href="index.html">go back home</a></p>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Silver Oak University - Library Management System</p>
        <p>Prof. Vedrucha Pandya | Silveroakuni.ac.in</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
