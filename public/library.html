<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - Silver Oak LMS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">
                <div class="logo-icon">📚</div>
                Silver Oak LMS
            </div>
            <nav>
                <ul id="user-nav">
                    <li><a href="library.html">📚 Library</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <section class="books-section">
            <h1 class="section-title">📚 Library Books</h1>
            <p style="color: #666; margin-bottom: 30px;">Browse and select books from our collection</p>

            <!-- Filter -->
            <div class="filter-section">
                <select id="category-filter" onchange="filterBooks()">
                    <option value="all">📚 All Categories</option>
                    <option value="Language">🗣️ Language</option>
                    <option value="Science">🔬 Science & Math</option>
                    <option value="Technology">💻 Technology & Programming</option>
                </select>
            </div>

            <!-- Books Grid -->
            <div class="books-grid" id="books-container">
                <!-- Books will be loaded by JavaScript -->
            </div>
        </section>
    </div>

    <!-- Book Details Modal -->
    <div class="modal" id="book-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('book-modal')">&times;</span>
            <div id="modal-book-details"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Silver Oak University - Library Management System</p>
        <p>Prof. Vedrucha Pandya | Silveroakuni.ac.in</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        window.addEventListener('load', function() {
            checkStudentAuth();
            displayBooks();
            updateUserUI();
        });

        function checkStudentAuth() {
            if (!currentUser) {
                window.location.href = 'student-login.html';
            }
        }
    </script>
</body>
</html>
