<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Silver Oak library management system</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<div class="navbar">
<div class="logo">📚 Silver Oak Library - Admin</div>

<nav>
<ul>
<li><a href="#dashboard">Dashboard</a></li>
<li><a href="#books">Books</a></li>
<li><a href="#students">Students</a></li>
<li><a href="#orders">Orders</a></li>
<li><button class="btn-logout" id="logoutBtn">Logout</button></li>
</ul>
</nav>

</div>
</header>

<div class="container">

<div class="admin-header">
<h1>👨‍💼 Admin Control Panel</h1>
<p>Prof. Vedrucha Pandya - Library Administrator</p>
</div>

<!-- DASHBOARD -->
<section id="dashboard">
<h2 class="section-title">Dashboard Statistics</h2>
<div id="dash-stats" class="dashboard-grid"></div>
</section>

<!-- BOOKS -->
<section id="books">
<h2 class="section-title">Books Management</h2>

<div class="card">
<h3>Add New Book</h3>

<form id="add-book-form">

<input type="text" id="book-name" placeholder="Book Name" required>

<select id="book-category" required>
<option value="">Select Category</option>
<option>Language</option>
<option>Science</option>
<option>Technology</option>
</select>

<input type="number" id="book-price" placeholder="Price ₹" required>

<button class="btn" type="submit">Add Book</button>

</form>
</div>

<div class="card">
<h3>All Books</h3>
<div id="books-table"></div>
</div>

</section>

<!-- STUDENTS -->
<section id="students">
<h2 class="section-title">Students</h2>
<div class="card">
<div id="students-table"></div>
</div>
</section>

<!-- ORDERS -->
<section id="orders">
<h2 class="section-title">Orders</h2>
<div class="card">
<div id="orders-table"></div>
</div>
</section>

</div>

<footer>
<p>© Silver Oak University LMS</p>
</footer>

<script src="js/app.js"></script>

<script>
    window.addEventListener('load', function() {
        checkAdminAuth();
        displayAdminStats();
        displayBooksAdmin();
        displayStudentsAdmin();
        displayOrdersAdmin();

        // Add event listener for add book form
        const addBookForm = document.getElementById('add-book-form');
        if (addBookForm) {
            addBookForm.addEventListener('submit', addNewBook);
        }

        // Add logout functionality
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function() {
                localStorage.removeItem('adminLogged');
                window.location.href = 'admin-login.html';
            });
        }
    });
</script>

</body>
</html>
