<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Library Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">
                <div class="logo-icon">📚</div>
                Library Management System
            </div>
            <nav>
                <ul id="user-nav">
                    <li><a href="library.html">🏠 Library</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <section class="cart-section">
            <h1 class="section-title">🛒 Shopping Cart</h1>

            <div class="cart-items" id="cart-items">
                <!-- Cart items will be loaded by JavaScript -->
            </div>

            <div class="cart-summary" id="cart-summary">
                <!-- Summary will be loaded by JavaScript -->
            </div>

            <div class="center-controls">
                <a href="library.html" class="btn">← Continue Shopping</a>
                <button class="btn btn-muted" onclick="clearCart()">Clear Cart</button>
            </div>
        </section>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>© 2026 Library Management System. All rights reserved.</p>
            <p>Designed and maintained by Prof. Vedrucha Pandya | <a href="https://silveroaks.ac.in" target="_blank" rel="noopener noreferrer">silveroaks.ac.in</a></p>
            <p>Contact: <a href="mailto:library@silveroaks.ac.in">library@silveroaks.ac.in</a> | +91 7984773148</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        function clearCart() {
            if (confirm('Are you sure you want to clear your cart?')) {
                cart = [];
                localStorage.setItem('cart', JSON.stringify([]));
                displayCart();
                showAlert('Cart cleared', 'info');
            }
        }

        window.addEventListener('load', function() {
            if (!currentUser) {
                window.location.href = 'student-login.html';
            }
            displayCart();
            updateUserUI();
        });
    </script>
</body>
</html>
