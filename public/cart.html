<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Silver Oak LMS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">
                <div class="logo-icon">📚</div>
                Silver Oak LMS
            </div>
            <nav>
                <ul id="user-nav">
                    <li><a href="library.html">🏠 Library</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <section class="cart-section">
            <h1 class="section-title">🛒 Shopping Cart</h1>

            <div class="cart-items" id="cart-items">
                <!-- Cart items will be loaded by JavaScript -->
            </div>

            <div class="cart-summary" id="cart-summary">
                <!-- Summary will be loaded by JavaScript -->
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <a href="library.html" class="btn" style="background: #667eea; margin-right: 10px;">← Continue Shopping</a>
                <button class="btn btn-secondary" onclick="clearCart()" style="background: #999;">Clear Cart</button>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2024 Silver Oak University - Library Management System</p>
        <p>Prof. Vedrucha Pandya | Silveroakuni.ac.in</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        function clearCart() {
            if (confirm('Are you sure you want to clear your cart?')) {
                cart = [];
                localStorage.setItem('cart', JSON.stringify([]));
                displayCart();
                showAlert('Cart cleared', 'info');
            }
        }

        window.addEventListener('load', function() {
            if (!currentUser) {
                window.location.href = 'student-login.html';
            }
            displayCart();
            updateUserUI();
        });
    </script>
</body>
</html>
